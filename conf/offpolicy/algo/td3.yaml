# @package algo
algo: td3
algo_log_name: fast_td3
load_run: "-1"
seed: 1
num_envs: 4096
batch_size: 8192
replay_buffer_n: 1000
updates_per_step: 4
learning_starts: 1
policy_frequency: 2
env_steps_per_sync: 1
max_iterations: 5000
save_interval: 500
gamma: 0.97
tau: 0.01
actor_lr: 3.0e-4
critic_lr: 3.0e-4
actor_hidden_dim: 256
critic_hidden_dim: 512
num_atoms: 101
obs_normalization: true
use_layer_norm: false
algo_params:
  weight_decay: 0.001
  v_min: -10.0
  v_max: 10.0
  init_scale: 0.01
  log_std_min: -5.0
  log_std_max: 0.0
  policy_noise: 0.1
  noise_clip: 0.2
  use_cdq: true
