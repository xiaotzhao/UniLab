defaults:
  - _self_
  - algo: sac
  - task: ${algo}/g1_walk_flat/mujoco

training:
  task_name: G1WalkFlat
  device: null
  logger: tensorboard
  wandb_project: unilab
  wandb_entity: null
  wandb_group: null
  wandb_job_type: null
  wandb_name: null
  wandb_tags: []
  wandb_notes: null
  wandb_mode: null
  sim_backend: mujoco
  num_gpus: 1
  use_amp: true
  play_only: false
  no_play: false
  play_render_mode: auto
  play_env_num: 16
  play_steps: 800
  cam_distance: 6.0
  cam_elevation: -20.0
  cam_azimuth: 90.0
  log_root: null
  log_dir: null
  no_sync_collection: false
  env_steps_per_sync: 1
  trace_enabled: false
  trace_output_dir: null
  trace_thread_time: false
  trace_cuda_events: true
  replay_prefetch_mode: one_tick
  verbose_metrics: false

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
  job_logging:
    root:
      handlers: [console]
