# @package _global_
# HORA Sharpa SAC MuJoCo teacher-training owner config.

training:
  task_name: SharpaInhandRotation
  sim_backend: mujoco
  use_amp: true
  env_steps_per_sync: 2
  no_play: true
  play_steps: 200
  render_spacing: 0.5
  cam_distance: 1.5
  cam_lookat: [0.75, 0.75, 0.4]
  cam_elevation: -20.0

interactive:
  action_mode: policy
  policy_obs_mode: actor
  camera_distance: 1.5
  camera_elevation: -20.0
  camera_azimuth: 90.0
  use_env_visual_model: true

algo:
  algo_log_name: hora_sac
  runtime_impl: hora_sac
  runtime_resolver: unilab.algos.torch.hora.sac:resolve_hora_sac_runtime
  num_envs: 1024
  batch_size: 2048
  replay_buffer_n: 1280
  updates_per_step: 14
  learning_starts: 1
  policy_frequency: 2
  max_iterations: 5371
  save_interval: 896
  actor_lr: 4.5e-4
  critic_lr: 4.5e-4
  use_symmetry: false
  actor:
    priv_info_embed_dim: 9
    priv_mlp_hidden_dims: [256, 128, 9]
  algo_params:
    alpha_lr: 4.5e-4
    amp_dtype: auto
    use_compile: true

reward:
  scales:
    rotate: 2.5
    obj_linvel: -0.3
    pose_diff: -0.4
    torque: -0.1
    work: -0.5
    object_pos: 0.003
  angvel_clip_min: -0.5
  angvel_clip_max: 0.5

env:
  post_step_forward_sensor: true
  zero_action_test_mode: false
  clip_obs: 5.0
  clip_actions: 1.0
  reset_height_lower: 0.59906
  reset_height_upper: 0.63906
  reset_angle_diff: 0.7853981633974483
  rot_axis: [0.0, 0.0, 1.0]
  grasp_cache_path: caches/sharpa_grasp_linspace
  sensor:
    tactile_force_sensor_names:
      - contact_right_thumb_elastomer_force
      - contact_right_index_elastomer_force
      - contact_right_middle_elastomer_force
      - contact_right_ring_elastomer_force
      - contact_right_pinky_elastomer_force
  disable_tactile_ids: []
  use_default_object_pose_for_object_pos_anchor: true
  obs:
    observation_mode: separated
    enable_tactile: true
    binary_contact: false
    enable_contact_pos: false
    contact_smooth: 0.5
    contact_threshold: 0.05
    tactile_force_clip_max: 4.0
  priv_info:
    include_friction_scale: true
    include_gravity_direction: false
  control_config:
    action_scale: 0.041666666666666664
    p_gain: 1.0
    d_gain: 0.1
    torque_control: false
    dof_limits_scale: 0.9
  domain_rand:
    scale_list: [0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.4, 1.5]
    randomize_gravity_direction: true
    gravity_direction_magnitude: 9.81
    randomize_pd_gains: true
    randomize_p_gain_scale_lower: 0.5
    randomize_p_gain_scale_upper: 2.0
    randomize_d_gain_scale_lower: 0.5
    randomize_d_gain_scale_upper: 2.0
    randomize_friction: true
    randomize_friction_scale_lower: 0.75
    randomize_friction_scale_upper: 1.25
    elastomer_base_friction: 2.0
    metal_base_friction: 1.0
    object_base_friction: 2.0
    randomize_com: true
    randomize_com_lower: -0.01
    randomize_com_upper: 0.01
    randomize_mass: true
    randomize_mass_lower: 0.01
    randomize_mass_upper: 0.25
    force_scale: 2.0
    random_force_prob_scalar: 0.25
    force_decay: 0.9
    force_decay_interval: 0.08
    joint_noise_scale: 0.02
    contact_latency: 0.005
    contact_sensor_noise: 0.01
