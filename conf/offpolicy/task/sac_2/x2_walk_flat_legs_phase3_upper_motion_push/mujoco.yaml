# @package _global_
# Phase 3: 上半身随机轨迹跟踪 + 施加随机外力扰动
defaults:
  - /task/sac/x2_walk_flat/mujoco
  - _self_

training:
  task_name: X2WalkFlat
  sim_backend: mujoco

env:
  upper_body_driver:
    mode: random_track
  domain_rand:
    push_robots: true
    push_interval: 750
    max_force: [1.0, 1.0, 0.5]
    push_body_name: pelvis
