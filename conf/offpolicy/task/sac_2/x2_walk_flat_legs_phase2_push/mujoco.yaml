# @package _global_
# Phase 2: 仅训练腿部，上半身冻结（hold），施加随机外力扰动
defaults:
  - /task/sac/x2_walk_flat/mujoco
  - _self_

training:
  task_name: X2WalkFlat
  sim_backend: mujoco

env:
  upper_body_driver:
    mode: hold
  domain_rand:
    push_robots: true
    push_interval: 750
    max_force: [40.0, 40.0, 25.0]
    push_body_name: pelvis
