# @package _global_
# G1 flip tracking with FastSAC on MuJoCo — task ``g1_flip_tracking``.
#
# Migrates the PPO flip motion (``conf/ppo/task/g1_flip_tracking/mujoco.yaml``)
# into the SAC pipeline:
#   * algo block follows the proven WBT-SAC profile (``g1_sac_wbt``),
#     since the action is being migrated INTO the SAC algorithm;
#   * env / reward block follows the flip task (scene / motion / per-joint
#     action_scale / clean obs), which are task properties, not algo knobs.
#
# Train command:
#   uv run train --algo sac --task g1_flip_tracking --sim mujoco training.use_amp=true
#
# task_name binds to ``G1FlipTrackingSAC`` (see
# ``src/unilab/envs/motion_tracking/g1/flip_tracking_sac.py``): the flip cfg
# composed with the SAC asymmetric actor-critic obs (base_lin_vel into critic).
# PPO flip (``G1FlipTracking``) and other SAC tasks are unaffected.
training:
  task_name: G1FlipTrackingSAC
  sim_backend: mujoco
  play_steps: 1000
algo:
  num_envs: 4096
  max_iterations: 25000
  save_interval: 1000
  gamma: 0.99
  tau: 0.05
  num_atoms: 501
  updates_per_step: 4
  policy_frequency: 2
  use_symmetry: false
  algo_params:
    alpha_init: 0.005
    target_entropy_ratio: 0.05
    max_grad_norm: 10.0
env:
  sampling_mode: mixed
  sampling_start_ratio: 0.1
  truncate_on_clip_end: true
  sim_dt: 0.005
  control_config:
    action_scale:
      - 0.5475464629911068
      - 0.35066146637882434
      - 0.5475464629911068
      - 0.35066146637882434
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.5475464629911068
      - 0.35066146637882434
      - 0.5475464629911068
      - 0.35066146637882434
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.5475464629911068
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.07450087032950714
      - 0.07450087032950714
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.07450087032950714
      - 0.07450087032950714
  anchor_pos_z_threshold: 0.5
  ee_body_pos_z_threshold: 0.5
  terminate_on_undesired_contacts: true
  noise_config:
    level: 0.0
reward:
  scales:
    motion_global_root_pos: 0.5
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.5
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_ee_body_pos_z: 2.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.005
    joint_limit: -10.0
    undesired_contacts: -0.1
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
