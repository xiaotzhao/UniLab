      - 0.35066146637882434
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.5475464629911068
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.07450087032950714
      - 0.07450087032950714
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.43857731392336724
      - 0.07450087032950714
      - 0.07450087032950714
  anchor_pos_z_threshold: 1000000000.0
  ee_body_pos_z_threshold: 1000000000.0
  terminate_on_undesired_contacts: false
  noise_config:
    level: 0.0
reward:
  scales:
    motion_global_root_pos: 0.5
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.5
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_ee_body_pos_z: 2.0
    motion_joint_pos: 0.5
    motion_joint_vel: 0.25
    action_rate_l2: -0.005
    joint_limit: -10.0
    undesired_contacts: -0.1
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
