# @package _global_
training:
  task_name: Go2JoystickFlat
  sim_backend: mujoco
algo:
  num_envs: 1024
  learning_starts: 50
  max_iterations: 4000
  save_interval: 1000
  updates_per_step: 2
  batch_size: 2048
  replay_buffer_n: 4096
  tau: 0.05
env:
  control_config:
    action_scale: 0.4
  domain_rand:
    randomize_kp: true
    randomize_kd: true
    randomize_base_mass: true
    random_com: true
    randomize_gravity: true
    push_robots: true
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 0.1
    scale_gyro: 0.0
    scale_gravity: 0.0
    scale_linvel: 0.0
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -20.0
    action_rate: -0.02
    similar_to_default: -0.4
    contact: 1.5
    swing_feet_z: 4.0
  tracking_sigma: 0.4
  base_height_target: 0.3