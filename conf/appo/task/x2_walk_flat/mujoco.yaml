# @package _global_
training:
  task_name: X2WalkFlat
  sim_backend: mujoco
algo:
  max_iterations: 500
  save_interval: 100
env:
  control_config:
    action_scale: 0.25
  curriculum:
    enabled: true
    initial_scale: 0.5
    min_scale: 0.5
    max_scale: 1.0
    level_down_threshold: 150.0
    level_up_threshold: 750.0
    degree: 0.001
  noise_config:
    level: 1.0
    scale_gyro: 0.0
    scale_gravity: 0.0
    scale_joint_angle: 0.01
    scale_joint_vel: 0.1
    scale_linvel: 0.0
reward:
  scales:
    tracking_lin_vel: 2.0
    tracking_ang_vel: 0.2
    feet_phase: 1.0
    lin_vel_z: -1.0
    ang_vel_xy: -0.25
    base_height: -100.0
    orientation: -5.0
    action_rate: -0.01
    pose: -0.3
  tracking_sigma: 0.25
  gait_frequency: 1.5
  feet_phase_swing_height: 0.07
  feet_phase_tracking_sigma: 0.008
  base_height_target: 0.630
  min_base_height: 0.47
  max_tilt_deg: 25.0
  pose_weights: [0.01, 1.0, 5.0, 0.01, 5.0, 5.0, 0.01, 1.0, 5.0, 0.01, 5.0, 5.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0]
