defaults:
  - _self_
  - reward: default
  - task: go1_joystick

algo:
  algo: ppo
  algo_log_name: mlx_rl_train
  seed: 1
  num_envs: 4096
  num_steps_per_env: 24
  max_iterations: 101
  empirical_normalization: false
  obs_groups:
    default:
      - policy
  policy:
    init_noise_std: 1.0
    actor_hidden_dims: [512, 256, 128]
    critic_hidden_dims: [512, 256, 128]
    activation: elu
    class_name: ActorCritic
  algorithm:
    class_name: PPO
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.01
    num_learning_epochs: 5
    num_mini_batches: 4
    learning_rate: 1.0e-3
    schedule: adaptive
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    target_kl_stop: null
    max_grad_norm: 1.0
    adaptive_kl_beta: 0.9
    adaptive_lr_growth: 1.1
    adaptive_lr_decay: 1.2
    adaptive_lr_update_interval: 5
    fast_mode: false
    metrics_interval: 1
    finite_check_interval: 1
    enable_compile: false
    warmup_strict_iters: 0
    warmup_metrics_interval: 1
    warmup_finite_check_interval: 1
    disable_finite_checks: false
    reward_normalization: false

training:
  task_name: Go1JoystickFlatTerrain
  sim_backend: mujoco
  play_only: false
  no_play: false
  load_run: "-1"
  play_env_num: 16
  play_steps: 150
  logger: tensorboard
  fp16: false
  log_root: logs/mlx_rl_train
  seed: 1
  log_interval: 10
  save_interval: 50

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
