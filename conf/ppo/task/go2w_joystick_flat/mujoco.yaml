# @package _global_
training:
  task_name: Go2WJoystickFlat
  sim_backend: mujoco
algo:
  num_envs: 1024
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    actor:
      - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 3.0e-4
    entropy_coef: 1.0e-3
env:
  commands:
    vel_limit:
      - [0.5, 0.0, -0.3]
      - [1.0, 0.0, 0.3]
  control_config:
    action_scale: 0.25
    wheel_action_scale: 10.0
    Kp: 35.0
    Kd: 0.5
    wheel_Kd: 0.5
  domain_rand:
    randomize_kp: true
    randomize_kd: true
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.005
    similar_to_default: -0.1
    torques: -0.0002
    wheel_vel: 0.0
    alive: 0.5
  tracking_sigma: 0.25
  base_height_target: 0.3
