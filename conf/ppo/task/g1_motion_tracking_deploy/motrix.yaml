# @package _global_
training:
  task_name: G1MotionTrackingDeploy
  sim_backend: motrix
  play_env_num: 128
  play_steps: 1000
algo:
  num_envs: 1024
  max_iterations: 15000
  save_interval: 500
  obs_groups:
    actor:
      - actor
  algorithm:
    entropy_coef: 0.005
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
play_profile:
  enabled: true
  env:
    render_spacing: 2.5
  scene:
    enabled: true
    source_model_file: src/unilab/assets/robots/g1/scene_flat.xml
    ground_texture_file: src/unilab/assets/robots/g1/textures/floor.png
    skybox_rgb1: [0.90, 0.90, 0.91]
    skybox_rgb2: [0.68, 0.68, 0.70]
    ground_texrepeat: [0.25, 0.25]
reward:
  scales:
    motion_global_root_pos: 1.0
    motion_global_root_ori: 0.5
    motion_body_pos: 1.0
    motion_body_ori: 1.0
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.05
    joint_limit: -10.0
    undesired_contacts: -0.1
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
